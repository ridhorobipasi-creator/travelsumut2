packages:
  "framer-motion": "For page transitions, scroll animations, and interactive elements"
  "date-fns": "For formatting dates in bookings and blogs"
  "recharts": "For the admin dashboard analytics and revenue charts"
  "lucide-react": "For crisp, consistent iconography across the app"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "For Zod schema validation in forms"
  "zod": "For form validation schemas"
  "clsx": "For conditional tailwind class merging"
  "tailwind-merge": "For resolving tailwind class conflicts"

images:
  - path: "artifacts/wisata-indonesia/public/images/logo-wisata.png"
    description: "A clean, modern logo for 'Wisata Indonesia', featuring a minimalist abstract mountain and wave motif in deep tropical green and warm sunset orange, transparent background."
    aspect_ratio: "1:1"
  - path: "artifacts/wisata-indonesia/public/images/hero-pattern.png"
    description: "Subtle, elegant abstract topographic map pattern or batik-inspired geometric pattern in very light warm sand colors, used for background texture."
    aspect_ratio: "16:9"

notes:
  - "Assuming React Query hooks are exported directly from @workspace/api-client-react"
  - "App uses a tropical warm theme with dark emerald green and sunset orange accents"
  - "Admin routes are protected visually but assume auth is handled at a higher/middleware layer"
