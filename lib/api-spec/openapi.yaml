      summary: Create a city
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCityInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/City"

  /cities/{id}:
    put:
      operationId: updateCity
      tags: [cities]
      summary: Update a city
      parameters:
        - name: id
