openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Wisata Indonesia API - Tourism Platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: provinces
    description: Province operations
  - name: cities
    description: City operations
  - name: destinations
    description: Destination operations
  - name: packages
    description: Tour package operations
  - name: vehicles
    description: Rental vehicle operations
  - name: bookings
    description: Booking operations
  - name: gallery
    description: Gallery operations
  - name: blog
    description: Blog operations
  - name: testimonials
    description: Testimonial operations
  - name: banners
    description: Banner operations
  - name: orders
    description: Order operations
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /provinces:
    get:
      operationId: getProvinces
      tags: [provinces]
      summary: List all provinces
      responses:
        "200":
          description: List of provinces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Province"
    post:
      operationId: createProvince
      tags: [provinces]
      summary: Create a province
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProvinceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Province"

  /provinces/{id}:
    get:
      operationId: getProvince
      tags: [provinces]
      summary: Get a province
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Province
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Province"
    put:
      operationId: updateProvince
      tags: [provinces]
      summary: Update a province
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProvinceInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Province"
    delete:
      operationId: deleteProvince
      tags: [provinces]
      summary: Delete a province
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /cities:
    get:
      operationId: getCities
      tags: [cities]
      summary: List all cities
      parameters:
        - name: provinceId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of cities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/City"
    post:
      operationId: createCity
