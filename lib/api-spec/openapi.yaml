components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Province:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - slug
        - createdAt

    CreateProvinceInput:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
      required:
        - name
        - slug

    City:
      type: object
      properties:
        id:
          type: integer
        provinceId:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        province:
          $ref: "#/components/schemas/Province"
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - provinceId
        - name
        - slug
        - createdAt

    CreateCityInput:
      type: object
      properties:
        provinceId:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
      required:
        - provinceId
        - name
        - slug

    Destination:
      type: object
      properties:
        id:
          type: integer
        cityId:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        rating:
          type: number
          nullable: true
        city:
          $ref: "#/components/schemas/City"
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - cityId
        - name
        - slug
        - createdAt

    CreateDestinationInput:
      type: object
      properties:
        cityId:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        rating:
          type: number
          nullable: true
      required:
        - cityId
        - name
        - slug

    TourPackage:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        duration:
          type: integer
        maxParticipants:
          type: integer
          nullable: true
        imageUrl:
          type: string
          nullable: true
        images:
          type: array
          items:
            type: string
        includes:
          type: array
          items:
            type: string
        excludes:
          type: array
          items:
            type: string
        itinerary:
          type: string
          nullable: true
        provinceId:
          type: integer
          nullable: true
        cityId:
          type: integer
          nullable: true
        isFeatured:
          type: boolean
        isActive:
          type: boolean
        rating:
          type: number
          nullable: true
        totalReviews:
          type: integer
        province:
          $ref: "#/components/schemas/Province"
          nullable: true
        city:
          $ref: "#/components/schemas/City"
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - title
        - slug
        - price
        - duration
        - images
        - includes
        - excludes
        - isFeatured
        - isActive
        - totalReviews
        - createdAt

    CreatePackageInput:
